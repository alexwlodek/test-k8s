apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx
  namespace: demo
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: istio-demo
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      access_log /dev/stdout;
      error_log /dev/stderr info;

      location /healthz {
        return 200 "ok\n";
      }

      location / {
        proxy_set_header Host backend.demo.svc.cluster.local;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend.demo.svc.cluster.local:8080/;
      }
    }

