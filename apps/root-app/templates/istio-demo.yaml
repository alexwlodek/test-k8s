apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    app.kubernetes.io/name: istio-demo
    app.kubernetes.io/part-of: local-platform
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: manifests/istio-demo
    directory:
      recurse: true
  destination:
    server: {{ .Values.destinationServer | quote }}
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

