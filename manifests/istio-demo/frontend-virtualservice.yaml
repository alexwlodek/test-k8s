apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: frontend
  namespace: demo
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: istio-demo
spec:
  hosts:
    - demo.localhost
    - demo.local
  gateways:
    - demo-gateway
  http:
    - route:
        - destination:
            host: frontend.demo.svc.cluster.local
            port:
              number: 8080

