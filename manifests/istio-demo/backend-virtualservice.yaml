apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: backend
  namespace: demo
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: istio-demo
spec:
  hosts:
    - backend
    - backend.demo.svc.cluster.local
  http:
    - route:
        - destination:
            host: backend.demo.svc.cluster.local
            subset: v1
            port:
              number: 8080
          weight: 80
        - destination:
            host: backend.demo.svc.cluster.local
            subset: v2
            port:
              number: 8080
          weight: 20

